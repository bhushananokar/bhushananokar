name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight
  workflow_dispatch:        # manual trigger from Actions tab
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write

    steps:

      # ── 1. Base stats + isometric calendar ──────────────────────────
      - name: Isometric Calendar
        uses: bhushananokar/metrics@master
        with:
          filename: metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── 2. Languages breakdown ───────────────────────────────────────
      - name: Languages
        uses: bhushananokar/metrics@master
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile
          plugin_languages_limit: 8
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used, recently-used

      # ── 3. GitHub stats (base section) ──────────────────────────────
      - name: Base Stats
        uses: bhushananokar/metrics@master
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata

      # ── 4. Achievements ─────────────────────────────────────────────
      - name: Achievements
        uses: bhushananokar/metrics@master
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

      # ── 5. Starred topics ───────────────────────────────────────────
      - name: Topics
        uses: bhushananokar/metrics@master
        with:
          filename: metrics.topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons   # shows logos instead of text

      # ── 6. Notable contributions ────────────────────────────────────
      - name: Notable Contributions
        uses: bhushananokar/metrics@master
        with:
          filename: metrics.notable.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request, issue
